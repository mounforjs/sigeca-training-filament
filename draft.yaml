models:

  Scene:
    name: string
    meaning: string
    description: string
    usage: string
    nanobanana: string
    grok: string
    construction_id: unsignedInteger
    interaction_id: unsignedInteger
    relationships:
      belongsTo: Construction, Interaction

  Interaction:
    title: string
    type: string
    relationships:
      hasMany: Scene

  Construction:
    title: string
    type: string
    relationships:
      hasMany: Meaning, Scene

  Meaning:
    title: string
    description: longtext
    construction_id: unsignedInteger
    relationships:
      belongsTo: Construction
    factory: false

  Capacitacion:
    titulo: string
    descripcion: longtext
    estado_id: unsignedInteger
    municipio_id: unsignedInteger
    parroquia_id: unsignedInteger
    fecha_inicio: date
    fecha_final: date
    status: string
    relationships:
      belongsToMany: User
      belongsTo: Estado, Municipio


  Estado:
    nombre_estado: string
    abr: string nullable


  Municipio:
    nombre_municipio: string
    estado_id: unsignedInteger
    municipio_id: unsignedInteger
    relationships:
      belongsTo: Estado


  Parroquia:
    nombre_parroquia: string
    estado_id: unsignedInteger
    municipio_id: unsignedInteger
    parroquia_id: unsignedInteger
    relationships:
      belongsTo: Estado, Municipio


  Asistencia:
    fecha: date
    asistio: boolean
    alumno_id: unsignedInteger
    capacitacion_id: unsignedInteger
    relationships:
      belongsTo: Capacitacion

  Componente:
    descripcion: longtext
    horas: unsignedInteger
    nivel_formacion_id: unsignedInteger
    relationships:
      belongsTo: Niveles



  # No necesitas definir el modelo User si ya existe en Laravel, 
  # pero debes añadir la relación inversa para que Blueprint genere la migración pivote.
  User:
    relationships:
      belongsToMany: Capacitacion

